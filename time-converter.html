<!DOCTYPE html>
<html lang="id">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Time Converter</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><link href="style.css" rel="stylesheet"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"></head>
<body class="bg-light">
<div class="container-fluid"><div class="row">
<div id="sidebar-desktop" class="d-none d-md-block col-md-3 col-lg-2"></div>
<div id="sidebar-mobile"></div>
<main class="col-md-9 col-lg-10 p-4">
<nav class="navbar navbar-dark navbar-tool d-md-none sticky-top mb-4"><div class="container-fluid"><button class="btn btn-outline-light btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">☰</button><span class="navbar-brand ms-2">Time Converter</span></div></nav>
<header class="d-flex align-items-center gap-3 mb-4"><div class="tool-icon" style="background:#f0fdf4;color:#16a34a;"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><h1 class="h3 mb-0">Time Converter</h1><p class="text-muted small mb-0">Konversi epoch/unix timestamp ke readable date, dan sebaliknya. Juga konversi timezone.</p></div></header>
<ul class="nav nav-tabs mb-4"><li class="nav-item"><a class="nav-link active" href="#" data-tab="epoch">Epoch Converter</a></li><li class="nav-item"><a class="nav-link" href="#" data-tab="tz">Timezone Converter</a></li></ul>
<div id="tabEpoch">
<div class="card shadow-sm p-4"><div class="row g-3 align-items-end">
<div class="col-md-6"><label class="form-label">Unix Timestamp (seconds)</label><input id="epochInput" class="form-control font-mono" value="1718612345"><div class="d-flex gap-2 mt-2"><button id="btnEpochNow" class="btn btn-outline-primary btn-sm">Now</button><button id="btnEpochToDate" class="btn btn-primary btn-sm">To Date</button></div></div>
<div class="col-md-6"><label class="form-label">Readable Date (ISO)</label><input id="dateInput" class="form-control font-mono" value="2024-06-17T06:59:05.000Z"><div class="d-flex gap-2 mt-2"><button id="btnDateNow" class="btn btn-outline-primary btn-sm">Now</button><button id="btnDateToEpoch" class="btn btn-primary btn-sm">To Epoch</button></div></div></div>
<div class="row g-3 mt-3"><div class="col-md-3"><div class="p-3 rounded text-center" style="background:var(--surface-soft)"><small class="text-muted">UTC</small><div id="dispUTC" class="fw-semibold font-mono mt-1">-</div></div></div>
<div class="col-md-3"><div class="p-3 rounded text-center" style="background:var(--surface-soft)"><small class="text-muted">Local</small><div id="dispLocal" class="fw-semibold font-mono mt-1">-</div></div></div>
<div class="col-md-3"><div class="p-3 rounded text-center" style="background:var(--surface-soft)"><small class="text-muted">ISO</small><div id="dispISO" class="fw-semibold font-mono mt-1">-</div></div></div>
<div class="col-md-3"><div class="p-3 rounded text-center" style="background:var(--surface-soft)"><small class="text-muted">Relative</small><div id="dispRelative" class="fw-semibold font-mono mt-1">-</div></div></div></div></div></div>
<div id="tabTZ" style="display:none;">
<div class="card shadow-sm p-4"><div class="row g-3">
<div class="col-md-4"><label class="form-label">Date & Time</label><input id="tzInput" type="datetime-local" class="form-control"></div>
<div class="col-md-4"><label class="form-label">From Timezone</label><select id="tzFrom" class="form-select font-mono"></select></div>
<div class="col-md-4"><label class="form-label">To Timezone</label><select id="tzTo" class="form-select font-mono"></select></div></div>
<div class="mt-3"><button id="btnTZConvert" class="btn btn-primary">Convert</button></div>
<div id="tzResult" class="mt-3 p-3 rounded bg-white border font-mono" style="display:none;"></div></div></div>
</main></div></div>
<footer class="bg-dark text-light py-3"><div class="container text-center small"><p class="mb-0">&copy; <span id="year">2025</span> WebApps &middot; Dibuat dengan <span class="text-danger">&hearts;</span> oleh <a href="https://naufalrakha.my.id" class="text-decoration-none text-info">Naufal Rakha Putra</a></p></div></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>document.getElementById('year').textContent=new Date().getFullYear();
// Tabs
document.querySelectorAll('#tabEpoch, #tabTZ').forEach(function(){});
document.querySelectorAll('.nav-tabs .nav-link').forEach(function(t){t.addEventListener('click',function(e){e.preventDefault();document.querySelectorAll('.nav-tabs .nav-link').forEach(function(x){x.classList.remove('active')});this.classList.add('active');
var tab=this.getAttribute('data-tab');document.getElementById('tabEpoch').style.display=tab==='epoch'?'block':'none';document.getElementById('tabTZ').style.display=tab==='tz'?'block':'none'})});
// Epoch
var eInp=document.getElementById('epochInput'),dInp=document.getElementById('dateInput'),dUTC=document.getElementById('dispUTC'),dLoc=document.getElementById('dispLocal'),dISO=document.getElementById('dispISO'),dRel=document.getElementById('dispRelative');
function updateFromEpoch(){var s=parseInt(eInp.value,10);if(isNaN(s))return;var d=new Date(s*1000);refreshDisplay(d)}
function updateFromDate(){var s=dInp.value;if(!s)return;var d=new Date(s);if(isNaN(d.getTime()))return;eInp.value=Math.floor(d.getTime()/1000);refreshDisplay(d)}
function refreshDisplay(d){dUTC.textContent=d.toUTCString();dLoc.textContent=d.toLocaleString();dISO.textContent=d.toISOString();
var n=Date.now(),diff=Math.floor((n-d.getTime())/1000);if(diff<60)dRel.textContent='just now';else if(diff<3600)dRel.textContent=Math.floor(diff/60)+' min ago';else if(diff<86400)dRel.textContent=Math.floor(diff/3600)+' hours ago';else dRel.textContent=Math.floor(diff/86400)+' days ago'}
document.getElementById('btnEpochNow').addEventListener('click',function(){eInp.value=Math.floor(Date.now()/1000);updateFromEpoch()});
document.getElementById('btnEpochToDate').addEventListener('click',updateFromEpoch);
document.getElementById('btnDateNow').addEventListener('click',function(){dInp.value=new Date().toISOString().slice(0,16);updateFromDate()});
document.getElementById('btnDateToEpoch').addEventListener('click',updateFromDate);
// TZ
var tzNames=Intl.supportedValuesOf?Intl.supportedValuesOf('timeZone'):['UTC','Asia/Jakarta','Asia/Makassar','Asia/Jayapura','America/New_York','America/Los_Angeles','Europe/London','Europe/Berlin','Asia/Tokyo','Australia/Sydney','Pacific/Auckland'];
var tzF=document.getElementById('tzFrom'),tzT=document.getElementById('tzTo');
tzNames.forEach(function(z){var o1=document.createElement('option');o1.value=z;o1.textContent=z;tzF.appendChild(o1);
var o2=document.createElement('option');o2.value=z;o2.textContent=z;tzT.appendChild(o2)});tzF.value=Intl.DateTimeFormat().resolvedOptions().timeZone;tzT.value='UTC';
document.getElementById('btnTZConvert').addEventListener('click',function(){var v=document.getElementById('tzInput').value;if(!v){alert('Pilih tanggal & waktu');return}var d=new Date(v+':00'),f=tzF.value,t=tzT.value;
var fStr=d.toLocaleString('en-US',{timeZone:f,timeStyle:'full',dateStyle:'full'}),tStr=d.toLocaleString('en-US',{timeZone:t,timeStyle:'full',dateStyle:'full'});
document.getElementById('tzResult').innerHTML='<div class="mb-2"><strong>'+f+':</strong> '+fStr+'</div><div><strong>'+t+':</strong> '+tStr+'</div>';document.getElementById('tzResult').style.display='block'});
updateFromEpoch();</script>
<script src="sidebar.js"></script>
</body></html>
