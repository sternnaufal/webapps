name: Deploy to Vercel

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Vercel
        run: |
          npm i -g vercel@latest
          mkdir -p .vercel
          cat > .vercel/project.json << 'EOF'
          {"projectId":"${{ secrets.VERCEL_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}
          EOF
          npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes

      - name: Notify Bing (IndexNow)
        run: |
          curl -sS "https://www.bing.com/ping?sitemap=https://webapps.naufalrakha.my.id/sitemap.xml" -o /dev/null -w "Bing: %{http_code}\n"
          echo "Search engines notified"

      - name: Google Auth
        id: auth
        if: ${{ secrets.GCP_SA_KEY != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true

      - name: Submit sitemap to Google Search Console
        if: ${{ secrets.GCP_SA_KEY != '' }}
        run: |
          SITEMAP="https://webapps.naufalrakha.my.id/sitemap.xml"
          SITE_URL="https://webapps.naufalrakha.my.id"
          curl -sS -X POST \
            "https://searchconsole.googleapis.com/v1/sitemaps?siteUrl=${SITE_URL}&feedpath=${SITEMAP}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            -H "Content-Length: 0" \
            -w "\nGSC sitemap submit: %{http_code}\n"
