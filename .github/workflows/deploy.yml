name: Deploy to Vercel

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Vercel
        run: |
          npm i -g vercel@latest
          mkdir -p .vercel
          cat > .vercel/project.json << 'EOF'
          {"projectId":"${{ secrets.VERCEL_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}
          EOF
          npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes

      - name: IndexNow
        run: |
          curl -sS "https://api.indexnow.org/indexnow?url=https://webapps.naufalrakha.my.id/&key=${{ secrets.INDEXNOW_KEY }}" -o /dev/null -w "IndexNow: %{http_code}\n" || echo "IndexNow skipped (no key)"

      - name: Submit sitemap to Google Search Console
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          python3 scripts/submit-sitemap.py \
            "https://webapps.naufalrakha.my.id" \
            "https://webapps.naufalrakha.my.id/sitemap.xml"
          rm -f /tmp/gcp-key.pem