name: Deploy to Vercel

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Vercel
        run: |
          npm i -g vercel@latest
          mkdir -p .vercel
          cat > .vercel/project.json << 'EOF'
          {"projectId":"${{ secrets.VERCEL_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}
          EOF
          npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes

      - name: Notify Bing (IndexNow)
        run: |
          curl -sS "https://www.bing.com/ping?sitemap=https://webapps.naufalrakha.my.id/sitemap.xml" -o /dev/null -w "Bing: %{http_code}\n"
          echo "Search engines notified"

      - name: Submit sitemap to Google Search Console
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          set -e
          if [ -z "$GCP_SA_KEY" ]; then echo "GCP_SA_KEY not set, skipping"; exit 0; fi
          echo "$GCP_SA_KEY" > /tmp/gcp-key.json
          TOKEN=$(python3 -c "
import json, time, base64, subprocess, urllib.request, urllib.parse, sys
sa = json.load(open('/tmp/gcp-key.json'))
now = int(time.time())
def b64(d): return base64.urlsafe_b64encode(json.dumps(d).encode()).rstrip(b'=').decode()
header = b64({'alg':'RS256','typ':'JWT'})
claim = b64({'iss':sa['client_email'],'scope':'https://www.googleapis.com/auth/webmasters','aud':'https://oauth2.googleapis.com/token','iat':now,'exp':now+3600})
with open('/tmp/gcp-key.pem','w') as f: f.write(sa['private_key'])
msg = (header+'.'+claim).encode()
sig = subprocess.run(['openssl','dgst','-sha256','-sign','/tmp/gcp-key.pem'],input=msg,capture_output=True).stdout
sig_b64 = base64.urlsafe_b64encode(sig).rstrip(b'=').decode()
assertion = header+'.'+claim+'.'+sig_b64
data = 'grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion='+urllib.parse.quote(assertion)
req = urllib.request.Request('https://oauth2.googleapis.com/token',data.encode(),{'Content-Type':'application/x-www-form-urlencoded'})
sys.stdout.write(json.load(urllib.request.urlopen(req))['access_token'])
")
          curl -sS -X POST \
            "https://searchconsole.googleapis.com/v1/sitemaps?siteUrl=https://webapps.naufalrakha.my.id&feedpath=https://webapps.naufalrakha.my.id/sitemap.xml" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Length: 0" \
            -w "\nGSC sitemap submit: %{http_code}\n"
          rm -f /tmp/gcp-key.json /tmp/gcp-key.pem