<body>

<div id="sidebar-desktop" class="d-none d-md-block col-md-3 col-lg-2 ps-0"></div>

<header class="d-flex align-items-center gap-3 mb-4"><div class="tool-icon" style="background:#fefce8;color:#ca8a04;">&amp;</div><div><h1 class="h3 mb-0">HTML Entity Encoder / Decoder</h1><p class="text-muted small mb-0">Encode atau decode karakter khusus HTML seperti &lt;, &gt;, &amp;, &quot; menjadi entity HTML.</p></div></header>

</div></div>
<div class="col-lg-6"><div class="d-flex justify-content-between align-items-center mb-1"><label class="form-label fw-semibold mb-0">Output</label><button id="btnCopy" class="btn btn-sm btn-outline-secondary">Copy</button></div>
<textarea id="outputArea" class="form-control font-mono" rows="8" readonly></textarea>
<div class="mt-2">
<div class="form-check form-check-inline"><input type="radio" name="encodeMode" id="modeNamed" class="form-check-input" checked><label class="form-check-label small" for="modeNamed">Named (&amp;nbsp;)</label></div>
<div class="form-check form-check-inline"><input type="radio" name="encodeMode" id="modeNumeric" class="form-check-input"><label class="form-check-label small" for="modeNumeric">Numeric (&amp;#160;)</label></div>
<div class="form-check form-check-inline"><input type="radio" name="encodeMode" id="modeHex" class="form-check-input"><label class="form-check-label small" for="modeHex">Hex (&amp;#xA0;)</label></div>
</div></div></div>
<div class="row mt-4"><div class="col-12">
<div class="card shadow-sm border-0 p-3"><h6 class="mb-3">Referensi Cepat HTML Entities</h6>
<div class="table-responsive"><table class="table table-sm small mb-0"><thead><tr><th>Karakter</th><th>Entity</th><th>Deskripsi</th><th>Karakter</th><th>Entity</th><th>Deskripsi</th></tr></thead><tbody id="entityTable"></tbody></table></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>document.getElementById('year').textContent=new Date().getFullYear();</script>
<script>
var inp=document.getElementById('inputArea'),out=document.getElementById('outputArea');

var namedEntities={
  '&amp;':'&','&lt;':'<','&gt;':'>','&quot;':'"','&apos;':"'",'&nbsp;':'\xa0','&copy;':'ôˋ','&reg;':'ôÛ','&trade;':'ãÂ','&euro;':'ã˜','&pound;':'ôÈ','&yen;':'ôË','&cent;':'ôÂ','&sect;':'ôÏ','&deg;':'ô¯','&plusmn;':'ôÝ','&times;':'û','&divide;':'ûñ','&micro;':'ôç','&middot;':'ôñ','&bull;':'ãÂ','&hellip;':'ãÎ','&prime;':'ãý','&Prime;':'ã°','&larr;':'ã','&rarr;':'ã','&uarr;':'ã','&darr;':'ã','&harr;':'ã','&spades;':'ã ','&clubs;':'ãÈ','&hearts;':'ãË','&diams;':'ãÎ','&there4;':'ãÇ','&permil;':'ã¯','&sum;':'ã','&prod;':'ã','&radic;':'ã','&infin;':'ã','&int;':'ã¨','&asymp;':'ã','&ne;':'ã ','&equiv;':'ãÀ','&le;':'ãÊ','&ge;':'ãË','&nabla;':'ã','&alpha;':'öÝ','&beta;':'öý','&gamma;':'ö°','&delta;':'öÇ','&pi;':'ü','&omega;':'ü',
};
var namedToChar={};for(var k in namedEntities)namedToChar[namedEntities[k]]=k;

function getMode(){return document.querySelector('input[name=encodeMode]:checked').id}

function encode(){
  var t=inp.value,mode=getMode();
  var r='';
  for(var i=0;i<t.length;i++){
    var c=t[i],code=t.charCodeAt(i);
    if(c==='&'){r+='&amp;';continue}
    if(c==='<'){r+='&lt;';continue}
    if(c==='>'){r+='&gt;';continue}
    if(c==='"'){r+='&quot;';continue}
    if(c==="'"){r+='&apos;';continue}
    if(code>127||code<32){
      if(mode==='modeNamed'&&namedToChar[c]){r+=namedToChar[c];continue}
      if(mode==='modeNumeric'){r+='&#'+code+';';continue}
      if(mode==='modeHex'){r+='&#x'+code.toString(16).toUpperCase()+';';continue}
    }
    r+=c;
  }
  out.value=r;
}

function decode(){
  var t=inp.value;
  t=t.replace(/&amp;/g,'&');
  t=t.replace(/&lt;/g,'<');
  t=t.replace(/&gt;/g,'>');
  t=t.replace(/&quot;/g,'"');
  t=t.replace(/&apos;/g,"'");
  t=t.replace(/&#x([0-9a-fA-F]+);/g,function(m,h){return String.fromCodePoint(parseInt(h,16))});
  t=t.replace(/&#(\d+);/g,function(m,d){return String.fromCodePoint(parseInt(d))});
  for(var e in namedEntities){
    t=t.split(e).join(namedEntities[e]);
  }
  out.value=t;
}

document.getElementById('btnEncode').addEventListener('click',encode);
document.getElementById('btnDecode').addEventListener('click',decode);
document.getElementById('btnClear').addEventListener('click',function(){inp.value='';out.value=''});
document.getElementById('btnSwap').addEventListener('click',function(){var t=inp.value;inp.value=out.value;out.value=t});
document.getElementById('btnCopy').addEventListener('click',function(){
  if(!out.value)return;var b=this;
  navigator.clipboard.writeText(out.value).then(function(){b.textContent='Copied!';setTimeout(function(){b.textContent='Copy'},1500)});
});
document.querySelectorAll('input[name=encodeMode]').forEach(function(r){r.addEventListener('change',encode)});

var refs=[['&amp;','&','&lt;','<','&gt;','>','&quot;','"','&apos;','&#39;',"'",'&nbsp;',' '],
  ['&copy;','ôˋ','&reg;','ôÛ','&trade;','ãÂ','&euro;','ã˜','&pound;','ôÈ','&yen;','ôË','&cent;','ôÂ'],
  ['&sect;','ôÏ','&deg;','ô¯','&plusmn;','ôÝ','&times;','û','&divide;','ûñ','&micro;','ôç','&middot;','ôñ'],
  ['&bull;','ãÂ','&hellip;','ãÎ','&larr;','ã','&rarr;','ã','&uarr;','ã','&darr;','ã','&harr;','ã'],
  ['&spades;','ã ','&clubs;','ãÈ','&hearts;','ãË','&diams;','ãÎ','&sum;','ã','&prod;','ã','&radic;','ã'],
  ['&infin;','ã','&asymp;','ã','&ne;','ã ','&equiv;','ãÀ','&le;','ãÊ','&ge;','ãË','&alpha;','öÝ']];
var et=document.getElementById('entityTable');
refs.forEach(function(r){
  et.innerHTML+='<tr><td class="font-mono">'+r[1]+'</td><td class="font-mono">'+r[0]+'</td><td>'+r[0].slice(1,-1)+'</td><td class="font-mono">'+r[3]+'</td><td class="font-mono">'+r[2]+'</td><td>'+r[2].slice(1,-1)+'</td></tr>';
});
</script>
