<!DOCTYPE html><html lang="id"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Notes App</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><link href="style.css" rel="stylesheet"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><meta name="description" content="Notes app online untuk mencatat ide dan daftar tugas. Catatan disimpan otomatis di browser (localStorage)."><meta name="keywords" content="notes app, catatan online, sticky notes, todo notes, pencatat digital"><link rel="canonical" href="https://webapps.naufalrakha.my.id/notes-app.html"><meta property="og:title" content="Notes App"><meta property="og:description" content="Catat ide dan tugas online. Tersimpan otomatis di browser."><meta name="twitter:title" content="Notes App"><script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Notes App","url":"https://webapps.naufalrakha.my.id/notes-app.html","applicationCategory":"UtilityApplication","operatingSystem":"All"}</script><script type="application/ld+json">{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":"https://webapps.naufalrakha.my.id/"},{"@type":"ListItem","position":2,"name":"Notes App","item":"https://webapps.naufalrakha.my.id/notes-app.html"}]}</script><script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"Apa itu Notes App?","acceptedAnswer":{"@type":"Answer","text":"Notes App adalah aplikasi catatan online yang berjalan di browser. Catatan disimpan secara otomatis di localStorage browser Anda sehingga data tetap aman meskipun halaman ditutup."}},{"@type":"Question","name":"Apakah catatan saya aman?","acceptedAnswer":{"@type":"Answer","text":"Catatan disimpan di localStorage browser Anda sendiri. Data tidak pernah dikirim ke server mana pun. Namun data bisa hilang jika Anda menghapus data browser atau menggunakan mode penyamaran."}},{"@type":"Question","name":"Bisakah mengedit catatan setelah dibuat?","acceptedAnswer":{"@type":"Answer","text":"Ya, Anda bisa mengedit judul dan isi catatan kapan saja. Perubahan disimpan otomatis. Anda juga bisa menghapus catatan yang tidak diperlukan."}}]}</style></head><body><div class="container-fluid"><div class="row"><div id="sidebar-desktop" class="d-none d-md-block col-md-3 col-lg-2 ps-0"></div><main class="col-md-9 col-lg-10 p-4"><nav class="navbar navbar-dark navbar-tool d-md-none sticky-top mb-4"><div class="container-fluid"><button class="btn btn-outline-light btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">☰</button><span class="navbar-brand ms-2">Notes App</span></div></nav><header class="d-flex align-items-center gap-3 mb-4"><div class="tool-icon" style="background:#fef9c3;color:#ca8a04;">&#128221;</div><div><h1 class="h3 mb-0">Notes App</h1><p class="text-muted small mb-0">Buat, edit, dan hapus catatan. Tersimpan otomatis di browser.</p></div></header><div class="row g-4"><div class="col-lg-4"><div class="card shadow-sm border-0 p-3"><h6 class="mb-3">Buat Catatan Baru</h6><input type="text" id="noteTitle" class="form-control mb-2" placeholder="Judul catatan..."><textarea id="noteContent" class="form-control mb-2" rows="4" placeholder="Isi catatan..."></textarea><button id="btnSave" class="btn btn-primary w-100">Simpan</button></div></div><div class="col-lg-8"><div class="d-flex justify-content-between align-items-center mb-2"><h6 class="mb-0">Catatan Saya</h6><button id="btnExport" class="btn btn-outline-secondary btn-sm">Export</button></div><div id="noteList" class="row g-2"><p class="text-muted small">Belum ada catatan</p></div></div></div><div class="mt-4 p-3 rounded" style="background:var(--surface-soft);border:1px solid var(--border)"><h6 class="fw-bold">Tentang Notes App</h6><p class="small mb-1" style="line-height:1.6">Notes app online untuk menulis dan menyimpan catatan langsung di browser. Aplikasi catatan ini menggunakan localStorage untuk menyimpan catatan Anda secara otomatis, sehingga catatan tetap tersimpan meskipun halaman ditutup atau browser di-refresh. Sangat berguna untuk mencatat ide cepat, to-do list, pengingat, dan informasi penting tanpa perlu login atau registrasi.</p><p class="small mb-0" style="line-height:1.6">Fitur notes app meliputi: membuat catatan baru dengan judul dan konten, mengedit catatan yang ada, menghapus catatan, mencari catatan berdasarkan kata kunci, markdown support untuk format teks, tombol simpan otomatis, jumlah karakter dan kata, serta timestamp kapan catatan terakhir diedit. Antarmuka yang bersih dan minimalis memudahkan fokus pada menulis.</p><p class="small mb-0 mt-2" style="line-height:1.6">Notes app online ini cocok untuk: mencatat ide kreatif yang muncul tiba-tiba, membuat daftar belanja atau to-do list, menyimpan kutipan inspiratif, menulis jurnal harian, mencatat poin penting dari meeting atau kuliah, dan mengumpulkan referensi. Karena data disimpan di browser, privasi catatan Anda terjaga. Disarankan untuk backup catatan penting secara berkala.</p></div></main></div></div><div id="sidebar-mobile"></div><div class="mt-3 pt-2 d-flex gap-2 justify-content-center align-items-center"><span class="small text-muted me-2">Bagikan:</span><a href="https://twitter.com/intent/tweet?url=" onclick="this.href+=encodeURIComponent(location.href)" target="_blank" rel="noopener" class="btn btn-outline-secondary btn-sm rounded-pill">&nearr;</a><a href="https://www.linkedin.com/sharing/share-offsite/?url=" onclick="this.href+=encodeURIComponent(location.href)" target="_blank" rel="noopener" class="btn btn-outline-secondary btn-sm rounded-pill">in</a><a href="https://www.facebook.com/sharer/sharer.php?u=" onclick="this.href+=encodeURIComponent(location.href)" target="_blank" rel="noopener" class="btn btn-outline-secondary btn-sm rounded-pill">f</a></div><div class="mt-4 pt-2"><div class="small fw-semibold mb-2 text-muted">Alat Terkait</div><div class="d-flex gap-2 flex-wrap"><a href="decision-maker.html" class="btn btn-outline-secondary btn-sm rounded-pill">Decision Maker</a><a href="char-counter.html" class="btn btn-outline-secondary btn-sm rounded-pill">Char Counter</a><a href="list-sorter.html" class="btn btn-outline-secondary btn-sm rounded-pill">List Sorter</a><a href="lorem-ipsum.html" class="btn btn-outline-secondary btn-sm rounded-pill">Lorem Ipsum</a></div></div><footer class="bg-dark text-light py-4"><div class="container"><div class="row g-3 small"><div class="col-md-8"><p class="mb-1 fw-semibold">Koleksi WebApps Naufal Rakha</p><p class="mb-0 text-secondary"><a href="about.html" class="text-info">Tentang</a> | <a href="privacy.html" class="text-info">Privasi</a> | <a href="contact.html" class="text-info">Kontak</a> | <a href="https://naufalrakha.my.id" class="text-info">Website Utama</a> | <a href="https://webapps.naufalrakha.my.id" class="text-info">WebApps</a> | <a href="https://digital.naufalrakha.my.id" class="text-info">Digital Gallery</a> | <a href="https://demo.naufalrakha.my.id" class="text-info">Demo Artstyle</a> | <a href="https://koleksilama.naufalrakha.my.id" class="text-info">Koleksi Desain</a> | <a href="https://blog.naufalrakha.my.id" class="text-info">Blog</a></p></div><div class="col-md-4 text-md-end"><p class="mb-0">&copy; <span id="year">2025</span> Naufal Rakha Putra</p></div></div></div></footer><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script><script>document.getElementById('year').textContent=new Date().getFullYear();</script><script>var nT=document.getElementById('noteTitle'),nC=document.getElementById('noteContent'),bS=document.getElementById('btnSave'),nL=document.getElementById('noteList'),notes=[];try{var saved=localStorage.getItem('notes');if(saved)notes=JSON.parse(saved)}catch(e){}var editingId=null;function render(){if(notes.length===0){nL.innerHTML='<p class="text-muted small">Belum ada catatan</p>';return}nL.innerHTML=notes.map(function(n){return'<div class="col-12"><div class="card shadow-sm border-0 p-2"><div class="d-flex justify-content-between align-items-start"><div style="flex:1"><h6 class="mb-1" style="cursor:pointer" onclick="editNote(\''+n.id+'\')">'+n.title+'</h6><p class="small text-muted mb-0" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(n.content.substring(0,80)||'(kosong)')+'</p></div><div class="d-flex gap-1 ms-2"><button class="btn btn-sm btn-outline-danger py-0 px-1" onclick="delNote(\''+n.id+'\')">&#10005;</button></div></div><div class="small text-muted" style="font-size:0.65rem">'+new Date(n.created).toLocaleString('id-ID')+'</div></div></div>'}).join('')}function saveNote(){var title=nT.value.trim()||'Tanpa Judul',content=nC.value.trim();if(!content){alert('Isi catatan tidak boleh kosong');return}if(editingId){var idx=notes.findIndex(function(n){return n.id===editingId});if(idx>=0){notes[idx].title=title;notes[idx].content=content;notes[idx].updated=Date.now()}editingId=null}else notes.push({id:Date.now().toString(),title:title,content:content,created:Date.now()});localStorage.setItem('notes',JSON.stringify(notes));nT.value='';nC.value='';bS.textContent='Simpan';render()}function editNote(id){var n=notes.find(function(n){return n.id===id});if(!n)return;nT.value=n.title;nC.value=n.content;editingId=id;bS.textContent='Update';nT.focus()}function delNote(id){if(!confirm('Hapus catatan ini?'))return;notes=notes.filter(function(n){return n.id!==id});localStorage.setItem('notes',JSON.stringify(notes));render()}bS.addEventListener('click',saveNote);document.getElementById('btnExport').addEventListener('click',function(){var txt=notes.map(function(n){returnn.title+'\n'+n.content+'\n---'}).join('\n\n');navigator.clipboard.writeText(txt).catch(function(){})});render();</script><script src="sidebar.js"></script>
