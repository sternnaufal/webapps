<html lang="id">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>

<body class="bg-light">
<div class="container-fluid"><div class="row">
<div id="sidebar-desktop" class="d-none d-md-block col-md-3 col-lg-2"></div>
<div id="sidebar-mobile"></div>
<main class="col-md-9 col-lg-10 p-4">
<nav class="navbar navbar-dark navbar-tool d-md-none sticky-top mb-4"><div class="container-fluid"><button class="btn btn-outline-light btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">☰</button><span class="navbar-brand ms-2">RSA Generator</span></div></nav>
<header class="d-flex align-items-center gap-3 mb-4"><div class="tool-icon" style="background:#f0f9ff;color:#0284c7;"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div><div><h1 class="h3 mb-0">RSA Key Generator</h1><p class="text-muted small mb-0">Generate pasangan kunci RSA 2048/4096-bit langsung di browser. Private key tidak pernah dikirim ke server.</p></div></header>
<div class="mb-3"><label class="form-label">Key Size</label>
<select id="keySize" class="form-select" style="max-width:200px;"><option value="2048">2048-bit</option><option value="4096">4096-bit</option></select>
<button id="btnGenerate" class="btn btn-primary mt-2">Generate Keys</button></div>
<div id="keyOutput" style="display:none;">
<div class="mb-3"><label class="form-label fw-semibold">Public Key (SPKI PEM)</label><textarea id="pubKey" class="form-control font-mono" rows="6" readonly></textarea><button class="btn btn-sm btn-outline-secondary mt-1 copy-key" data-target="pubKey">Copy</button></div>
<div class="mb-3"><label class="form-label fw-semibold">Private Key (PKCS8 PEM)</label><textarea id="privKey" class="form-control font-mono" rows="12" readonly></textarea><button class="btn btn-sm btn-outline-secondary mt-1 copy-key" data-target="privKey">Copy</button></div>
</div>
</main></div></div>
<footer class="bg-dark text-light py-3"><div class="container text-center small"><p class="mb-0">&copy; <span id="year">2025</span> WebApps &middot; Dibuat dengan <span class="text-danger">&hearts;</span> oleh <a href="https://naufalrakha.my.id" class="text-decoration-none text-info">Naufal Rakha Putra</a></p></div></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>document.getElementById('year').textContent=new Date().getFullYear();
function ab2pem(buf,label){var b64=btoa(String.fromCharCode.apply(null,new Uint8Array(buf))),chunks=[];for(var i=0;i<b64.length;i+=64)chunks.push(b64.substr(i,64));return'-----BEGIN '+label+'-----\n'+chunks.join('\n')+'\n-----END '+label+'-----\n'}
document.getElementById('btnGenerate').addEventListener('click',async function(){var size=parseInt(document.getElementById('keySize').value,10);this.disabled=true;this.textContent='Generating...';
try{var keyPair=await crypto.subtle.generateKey({name:'RSA-OAEP',modulusLength:size,publicExponent:new Uint8Array([1,0,1]),hash:'SHA-256'},true,['encrypt','decrypt']);
var pubBuf=await crypto.subtle.exportKey('spki',keyPair.publicKey),privBuf=await crypto.subtle.exportKey('pkcs8',keyPair.privateKey);
document.getElementById('pubKey').value=ab2pem(pubBuf,'PUBLIC KEY');document.getElementById('privKey').value=ab2pem(privBuf,'PRIVATE KEY');document.getElementById('keyOutput').style.display='block';
}catch(e){alert('Error: '+e.message)}finally{this.disabled=false;this.textContent='Generate Keys'}});
document.querySelectorAll('.copy-key').forEach(function(b){b.addEventListener('click',function(){var id=this.getAttribute('data-target'),text=document.getElementById(id).value;if(!text)return;navigator.clipboard.writeText(text).then(function(){var t=this;this.textContent='Copied!';setTimeout(function(){this.textContent='Copy'}.bind(this),1500)}.bind(this))})});</script>
<script src="sidebar.js"></script>
</body></html>
