<!DOCTYPE html>
<html lang="id">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Decision Maker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><link href="style.css" rel="stylesheet"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta name="description" content="Decision maker online. Acak pilihan, lempar koin, dadu, dan Magic 8 Ball untuk bantu keputusan.">
  <meta name="keywords" content="decision maker, random picker, coin flip, dice roller, magic 8 ball, acak pilihan">
  <link rel="canonical" href="https://webapps.naufalrakha.my.id/decision-maker.html">
  <meta property="og:title" content="Decision Maker">
  <meta property="og:description" content="Acak pilihan, lempar koin, dadu, dan Magic 8 Ball.">
  <meta name="twitter:title" content="Decision Maker">
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Decision Maker","url":"https://webapps.naufalrakha.my.id/decision-maker.html","applicationCategory":"EntertainmentApplication","operatingSystem":"All"}</script>
  <style>@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}.shake{animation:shake .3s ease}.eight-ball{width:180px;height:180px;border-radius:50%;background:#0f172a;display:flex;align-items:center;justify-content:center;margin:0 auto;cursor:pointer;transition:.3s}.eight-ball:hover{transform:scale(1.05)}.eight-ball-inner{width:80px;height:80px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:#0f172a}</style>
</head>
<body>
<div class="container-fluid"><div class="row">
<div id="sidebar-desktop" class="d-none d-md-block col-md-3 col-lg-2 ps-0"></div>
<main class="col-md-9 col-lg-10 p-4">
<nav class="navbar navbar-dark navbar-tool d-md-none sticky-top mb-4"><div class="container-fluid"><button class="btn btn-outline-light btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">?</button><span class="navbar-brand ms-2">Decision Maker</span></div></nav>
<header class="d-flex align-items-center gap-3 mb-4"><div class="tool-icon" style="background:#faf5ff;color:#a855f7;"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9.5 2L2 9.5 9.5 17 17 9.5z"/><path d="M9.5 17L17 9.5 22 14.5 14.5 22z"/></svg></div><div><h1 class="h3 mb-0">Decision Maker</h1><p class="text-muted small mb-0">Bantu ambil keputusan: acak pilihan, lempar koin, dadu, Magic 8 Ball, dan ya/tidak.</p></div></header>
<div class="row g-4">
<div class="col-md-6">
<div class="card shadow-sm border-0 p-3 mb-3"><h6 class="mb-3">Random Picker</h6>
<textarea id="pickerInput" class="form-control font-mono mb-2" rows="4" placeholder="Masukkan pilihan, satu per baris...">Nasi Goreng
Mie Ayam
Sate Ayam
Bakso
Pizza</textarea>
<button id="btnPick" class="btn btn-primary w-100">Acak Pilihan!</button>
<div id="pickResult" class="mt-3 text-center h4 fw-bold" style="color:var(--accent)"></div>
</div>
<div class="card shadow-sm border-0 p-3"><h6 class="mb-3">Ya / Tidak</h6>
<div class="text-center"><div id="ynResult" class="display-4 fw-bold mb-3" style="color:#6366f1">?</div>
<button id="btnYN" class="btn btn-primary btn-lg px-5">Jawab!</button></div></div>
</div>
<div class="col-md-6">
<div class="row g-3 mb-3"><div class="col-6">
<div class="card shadow-sm border-0 p-3 text-center"><h6 class="mb-2">Koin</h6>
<div id="coinResult" class="display-4 mb-2">?</div>
<button id="btnCoin" class="btn btn-outline-warning">Lempar!</button></div></div>
<div class="col-6">
<div class="card shadow-sm border-0 p-3 text-center"><h6 class="mb-2">Dadu</h6>
<div id="diceResult" class="display-4 mb-2">?</div>
<button id="btnDice" class="btn btn-outline-info">Lempar!</button></div></div></div>
<div class="card shadow-sm border-0 p-3 text-center"><h6 class="mb-3">Magic 8 Ball</h6>
<div class="eight-ball" id="eightBall"><div class="eight-ball-inner" id="eightText">8</div></div>
<div id="eightMsg" class="small text-muted mt-2">Klik bola untuk bertanya</div>
</div></div></div>
</main></div></div>
<div id="sidebar-mobile"></div>
<footer class="bg-dark text-light py-3"><div class="container text-center small"><p class="mb-0">? <span id="year">2025</span> WebApps ? oleh <a href="https://naufalrakha.my.id" class="text-info">Naufal Rakha Putra</a></p></div></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>document.getElementById('year').textContent=new Date().getFullYear();</script>
<script>
document.getElementById('btnPick').addEventListener('click',function(){
  var lines=document.getElementById('pickerInput').value.split('\n').filter(function(l){return l.trim()});
  if(!lines.length){document.getElementById('pickResult').textContent='Masukkan pilihan dulu!';return}
  document.getElementById('pickResult').textContent=lines[Math.floor(Math.random()*lines.length)];
});
document.getElementById('btnYN').addEventListener('click',function(){
  var answers=['Ya!','Tidak.','Mungkin','Coba lagi nanti','Pasti!','Jangan dulu','Terserah kamu','Iya sih','Kayaknya nggak deh','100% Ya!','No way!','Kenapa nggak?'];
  var el=document.getElementById('ynResult');el.textContent=answers[Math.floor(Math.random()*answers.length)];
  el.style.transform='scale(1.2)';setTimeout(function(){el.style.transform='scale(1)'},200);
});
var coinFaces=['?','?'];
document.getElementById('btnCoin').addEventListener('click',function(){
  document.getElementById('coinResult').textContent=coinFaces[Math.floor(Math.random()*2)];
});
var dice=[1,2,3,4,5,6];
document.getElementById('btnDice').addEventListener('click',function(){
  var el=document.getElementById('diceResult');el.textContent=dice[Math.floor(Math.random()*6)];
  el.style.transform='rotate(360deg)';setTimeout(function(){el.style.transform='rotate(0)'},300);
});
var eightAnswers=['It is certain','It is decidedly so','Without a doubt','Yes definitely','You may rely on it','As I see it, yes','Most likely','Outlook good','Yes','Signs point to yes','Reply hazy try again','Ask again later','Better not tell you now','Cannot predict now','Concentrate and ask again','Don\'t count on it','My reply is no','My sources say no','Outlook not so good','Very doubtful'];
document.getElementById('eightBall').addEventListener('click',function(){
  var el=document.getElementById('eightText'),msg=document.getElementById('eightMsg');
  el.textContent='?';msg.textContent='...';
  var ball=this;ball.classList.add('shake');
  setTimeout(function(){
    el.textContent=Math.floor(Math.random()*20+1);
    ball.classList.remove('shake');
  },300);
  setTimeout(function(){
    var answer=eightAnswers[Math.floor(Math.random()*eightAnswers.length)];
    el.textContent='';msg.textContent=answer;
    el.innerHTML='<span style="font-size:0.7rem;padding:4px">'+answer+'</span>';
  },600);
});
</script>
<script src="sidebar.js"></script>
</body></html>
