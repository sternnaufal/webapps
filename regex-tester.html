<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Regex Tester</title>
  
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .match-highlight { background: #fff3cd; border-radius: 2px; }
    .match-highlight.active { background: #ffc107; }
    .match-info { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace; font-size: 0.8rem; }
    #testArea { font-family: monospace; font-size: 0.9rem; resize: vertical; min-height: 180px; }
  </style>
  <meta name="description" content="Tes regular expression online dengan highlight matches. Regex tester dengan replace dan split.">
  <meta name="keywords" content="regex tester, regular expression, regex online, regex test, regex tool">
  <link rel="canonical" href="https://webapps.naufalrakha.my.id/regex-tester.html">

  <!-- Open Graph -->
  <meta property="og:title" content="Regex Tester">
  <meta property="og:description" content="Tes regular expression online dengan highlight matches. Regex tester dengan replace dan split.">
  <meta property="og:url" content="https://webapps.naufalrakha.my.id/regex-tester.html">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://webapps.naufalrakha.my.id/android-chrome-512x512.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Regex Tester">
  <meta name="twitter:description" content="Tes regular expression online dengan highlight matches. Regex tester dengan replace dan split.">
  <meta name="twitter:image" content="https://webapps.naufalrakha.my.id/android-chrome-512x512.png">
</head>
<body class="bg-light">

<div class="container-fluid">
  <div class="row">
    <div id="sidebar-desktop" class="d-none d-md-block col-md-3 col-lg-2"></div>

    <div id="sidebar-mobile"></div>

    <main class="col-md-9 col-lg-10 p-4">
      <nav class="navbar navbar-dark navbar-tool d-md-none sticky-top mb-4">
        <div class="container-fluid">
          <button class="btn btn-outline-light btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">☰</button>
          <span class="navbar-brand ms-2">Regex Tester</span>
        </div>
      </nav>

      <header class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-3">
          <div class="tool-icon" style="background:var(--accent-soft);color:var(--accent);"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg></div>
          <div>
            <h1 class="h3 mb-0">Regex Tester</h1>
            <p class="text-muted small mb-0">Uji coba regular expression secara live — match, group, dan replace.</p>
          </div>
        </div>
      </header>

      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label for="regexPattern" class="form-label">Pattern</label>
          <div class="input-group">
            <span class="input-group-text">/</span>
            <input type="text" id="regexPattern" class="form-control font-monospace" placeholder="[a-z]+" value="\b\w{4,}\b">
            <span class="input-group-text">/</span>
            <input type="text" id="regexFlags" class="form-control font-monospace" placeholder="gmi" value="gm" style="max-width: 80px;">
          </div>
        </div>
        <div class="col-md-3">
          <label class="form-label">Replace with</label>
          <input type="text" id="replaceText" class="form-control font-monospace" placeholder="(opsional)">
        </div>
        <div class="col-md-3 d-flex align-items-end gap-2">
          <button id="btnReplace" class="btn btn-warning">Replace</button>
          <button id="btnClear" class="btn btn-outline-danger">Clear</button>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-lg-8">
          <label for="testArea" class="form-label">Test String</label>
          <textarea id="testArea" class="form-control" placeholder="Masukkan teks untuk diuji...">The quick brown fox jumps over the lazy dog. Contact: support@example.com or call 555-1234.</textarea>
          <div id="highlightedPreview" class="border rounded p-3 mt-2 bg-white" style="min-height: 80px; white-space: pre-wrap; font-family: monospace; font-size: 0.9rem;"></div>
        </div>
        <div class="col-lg-4">
          <div class="card shadow-sm">
            <div class="card-header fw-semibold">Match Results</div>
            <div class="card-body p-2">
              <div id="matchCount" class="small mb-2 text-muted">0 matches</div>
              <div id="matchList" style="max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 0.8rem;"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<footer class="bg-dark text-light py-3">
  <div class="container text-center small">
    <p class="mb-0">&copy; <span id="year">2025</span> WebApps &middot; Dibuat dengan <span class="text-danger">&hearts;</span> oleh <a href="https://naufalrakha.my.id" class="text-decoration-none text-info">Naufal Rakha Putra</a></p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>document.getElementById('year').textContent = new Date().getFullYear();</script>

<script>
var pattern = document.getElementById('regexPattern');
var flags = document.getElementById('regexFlags');
var testArea = document.getElementById('testArea');
var preview = document.getElementById('highlightedPreview');
var matchCount = document.getElementById('matchCount');
var matchList = document.getElementById('matchList');
var replaceText = document.getElementById('replaceText');

function update() {
  try {
    var re = new RegExp(pattern.value, flags.value);
    var text = testArea.value;
    var matches = [];
    var m;
    var safety = 0;
    while ((m = re.exec(text)) !== null) {
      matches.push({ index: m.index, text: m[0], groups: m.slice(1) });
      if (!re.global) break;
      if (m.index === re.lastIndex) re.lastIndex++;
      if (++safety > 50000) { matches.push({ text: '(truncated at 50k matches)', index: -1, groups: [] }); break; }
    }

    if (matches.length === 0) {
      preview.textContent = text;
      matchCount.textContent = '0 matches';
      matchList.innerHTML = '<div class="text-muted p-2">No matches</div>';
      return;
    }

    matchCount.textContent = matches.length + (matches.length === 1 ? ' match' : ' matches');
    var listHtml = '';
    matches.forEach(function(mt, i) {
      var groups = mt.groups.length > 0 ? ' groups: [' + mt.groups.join(', ') + ']' : '';
      listHtml += '<div class="border-bottom py-1 px-1"><span class="badge bg-secondary me-1">' + (i + 1) + '</span> <span class="text-success">"' + escapeHtml(mt.text) + '"</span> <span class="text-muted">@' + mt.index + '</span>' + groups + '</div>';
    });
    matchList.innerHTML = listHtml;

    var html = '';
    var lastIdx = 0;
    matches.forEach(function(mt) {
      html += escapeHtml(text.slice(lastIdx, mt.index));
      html += '<span class="bg-warning bg-opacity-25 border border-warning rounded px-1">' + escapeHtml(mt.text) + '</span>';
      lastIdx = mt.index + mt.text.length;
    });
    html += escapeHtml(text.slice(lastIdx));
    preview.innerHTML = html;
  } catch (e) {
    preview.textContent = 'Error: ' + e.message;
    matchCount.textContent = '—';
    matchList.innerHTML = '<div class="text-danger p-2">' + escapeHtml(e.message) + '</div>';
  }
}

function escapeHtml(s) {
  var div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function doReplace() {
  try {
    var re = new RegExp(pattern.value, flags.value);
    var replacement = replaceText.value;
    testArea.value = testArea.value.replace(re, replacement);
    update();
  } catch (e) {
    alert('Regex error: ' + e.message);
  }
}

pattern.addEventListener('input', update);
flags.addEventListener('input', update);
testArea.addEventListener('input', update);
document.getElementById('btnReplace').addEventListener('click', doReplace);
document.getElementById('btnClear').addEventListener('click', function() { testArea.value = ''; update(); });

update();
</script>
<script src="sidebar.js"></script>
</body>
</html>
