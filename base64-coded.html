<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Base64 Encode / Decode</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
<body class="bg-light">

<div class="container-fluid">
  <div class="row">
    <!-- Sidebar Desktop -->
    <div id="sidebar-desktop" class="d-none d-md-block col-md-3 col-lg-2"></div>

    <!-- Sidebar Mobile (Offcanvas) -->
    <div id="sidebar-mobile"></div>

    <!-- Main App -->
    <main class="col-md-9 col-lg-10 p-4">
      <!-- Navbar khusus mobile -->
      <nav class="navbar navbar-dark navbar-tool d-md-none sticky-top mb-4">
        <div class="container-fluid">
          <button class="btn btn-outline-light btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
            ☰
          </button>
          <span class="navbar-brand ms-2">Base64 Encode/Decode</span>
        </div>
      </nav>

      <header class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-3">
          <div class="tool-icon" style="background:var(--accent-soft);color:var(--accent);"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg></div>
          <div>
            <h1 class="h3 mb-0">Base64 Encode / Decode</h1>
            <p class="text-muted small mb-0">
              Ubah teks menjadi Base64 atau sebaliknya.
            </p>
          </div>
        </div>
      </header>

      <!-- Form -->
      <div class="row g-3 mb-4">
        <div class="col-12">
          <label for="text" class="form-label">Masukkan Teks</label>
          <textarea id="text" class="form-control" rows="4" placeholder="Teks untuk encode atau Base64 untuk decode"></textarea>
        </div>
        <div class="col-md-6 d-grid">
          <button type="button" id="encodeBtn" class="btn btn-success">Encode</button>
        </div>
        <div class="col-md-6 d-grid">
          <button type="button" id="decodeBtn" class="btn btn-warning">Decode</button>
        </div>
      </div>

      <!-- Hasil -->
      <div id="results" style="display: none;">
        <div class="card shadow-sm p-3">
          <h5 class="mb-3">Hasil</h5>
          <div id="resultContent"></div>
          <div class="mt-3">
            <button type="button" id="copyBtn" class="btn btn-sm btn-outline-secondary">Copy</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-light py-3">
  <div class="container text-center small">
    <p class="mb-0">
      © <span id="year">2025</span> WebApps · Dibuat dengan <span class="text-danger">❤️</span> oleh
      <a href="https://naufalrakha.my.id" class="text-decoration-none text-info">Naufal Rakha Putra</a>
    </p>
  </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

let currentResult = '';

function encode() {
  const input = document.getElementById('text').value;
  if (!input.trim()) {
    alert('Masukkan teks terlebih dahulu');
    return;
  }
  try {
    currentResult = btoa(unescape(encodeURIComponent(input)));
    showResult(`<p><strong>Encoded:</strong></p><pre class='bg-light p-3 border rounded'>${escapeHtml(currentResult)}</pre>`);
  } catch (e) {
    alert('Gagal encode: ' + e.message);
  }
}

function decode() {
  const input = document.getElementById('text').value;
  if (!input.trim()) {
    alert('Masukkan Base64 terlebih dahulu');
    return;
  }
  try {
    currentResult = decodeURIComponent(escape(atob(input)));
    showResult(`<p><strong>Decoded:</strong></p><pre class='bg-light p-3 border rounded'>${escapeHtml(currentResult)}</pre>`);
  } catch (e) {
    alert('Input bukan Base64 yang valid!');
  }
}

function showResult(html) {
  document.getElementById('resultContent').innerHTML = html;
  document.getElementById('results').style.display = 'block';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function copyResult() {
  navigator.clipboard.writeText(currentResult).then(() => {
    const btn = document.getElementById('copyBtn');
    const oldText = btn.textContent;
    btn.textContent = '✅ Copied!';
    setTimeout(() => { btn.textContent = oldText; }, 2000);
  }).catch(() => {
    alert('Gagal menyalin');
  });
}

document.getElementById('encodeBtn').addEventListener('click', encode);
document.getElementById('decodeBtn').addEventListener('click', decode);
document.getElementById('copyBtn').addEventListener('click', copyResult);
</script>
<script src="sidebar.js"></script>
</body>
</html>
