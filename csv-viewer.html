<!DOCTYPE html>
<html lang="id">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><link href="style.css" rel="stylesheet"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">  <meta name="description" content="Lihat dan filter file CSV/TSV online. Preview tabel dengan pencarian dan pengurutan data.">
  <meta name="keywords" content="csv viewer, tsv viewer, csv parser, csv editor, data viewer">
  <link rel="canonical" href="https://webapps.naufalrakha.my.id/csv-viewer.html">

  <!-- Open Graph -->
  <meta property="og:title" content="CSV/TSV Viewer">
  <meta property="og:description" content="Lihat dan filter file CSV/TSV online. Preview tabel dengan pencarian dan pengurutan data.">
  <meta property="og:url" content="https://webapps.naufalrakha.my.id/csv-viewer.html">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="CSV/TSV Viewer">

</head>
<body class="bg-light">
<div class="container-fluid"><div class="row">
<div id="sidebar-desktop" class="d-none d-md-block col-md-3 col-lg-2"></div>
<div id="sidebar-mobile"></div>
<main class="col-md-9 col-lg-10 p-4">
<nav class="navbar navbar-dark navbar-tool d-md-none sticky-top mb-4"><div class="container-fluid"><button class="btn btn-outline-light btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">☰</button><span class="navbar-brand ms-2">CSV/TSV Viewer</span></div></nav>
<header class="d-flex align-items-center gap-3 mb-4"><div class="tool-icon" style="background:#eef2ff;color:#6366f1;"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 10h18M3 14h18M3 18h18M3 6h18"/></svg></div><div><h1 class="h3 mb-0">CSV / TSV Viewer</h1><p class="text-muted small mb-0">Paste data CSV/TSV, atur delimiter, dan lihat sebagai tabel interaktif.</p></div></header>
<div class="row g-3 mb-3">
<div class="col-md-8"><label class="form-label">Data</label><textarea id="csvInput" class="form-control font-mono" rows="8" placeholder="name,email,role&#10;Naufal,naufal@example.com,Admin&#10;Rakha,rakha@example.com,User">name,email,role
Naufal,naufal@example.com,Admin
Rakha,rakha@example.com,User</textarea></div>
<div class="col-md-4">
<div class="mb-3"><label class="form-label">Delimiter</label><select id="delimiter" class="form-select"><option value="," selected>Comma (,)</option><option value=";">Semicolon (;)</option><option value="|">Pipe (|)</option><option value="	">Tab</option></select></div>
<div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="hasHeader" checked><label class="form-check-label" for="hasHeader">Baris pertama header</label></div>
<button id="btnParse" class="btn btn-primary w-100">Parse</button>
<button id="btnClear" class="btn btn-outline-danger w-100 mt-2">Clear</button>
</div></div>
<div id="tableContainer" style="display:none;"><div class="card shadow-sm"><div class="table-responsive"><table id="csvTable" class="table table-sm table-bordered table-striped mb-0"></table></div></div></div>
</main></div></div>
<footer class="bg-dark text-light py-3"><div class="container text-center small"><p class="mb-0">&copy; <span id="year">2025</span> WebApps &middot; Dibuat dengan <span class="text-danger">&hearts;</span> oleh <a href="https://naufalrakha.my.id" class="text-decoration-none text-info">Naufal Rakha Putra</a></p></div></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>document.getElementById('year').textContent=new Date().getFullYear();
var inp=document.getElementById('csvInput'),delim=document.getElementById('delimiter'),hasHdr=document.getElementById('hasHeader'),con=document.getElementById('tableContainer'),tbl=document.getElementById('csvTable');
function parse(){var t=inp.value.trim();if(!t)return;var d=delim.value,r=t.split('\n').map(function(l){return l.split(d)}),h=hasHdr.checked&&r.length>0?r.shift():null,s='<thead class="table-light">';if(h){s+='<tr>';for(var i=0;i<h.length;i++)s+='<th>'+esc(h[i])+'</th>';s+='</tr>'}s+='</thead><tbody>';for(var i=0;i<r.length;i++){s+='<tr>';for(var j=0;j<r[i].length;j++)s+='<td>'+esc(r[i][j])+'</td>';s+='</tr>'}s+='</tbody>';tbl.innerHTML=s;con.style.display='block'}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.getElementById('btnParse').addEventListener('click',parse);document.getElementById('btnClear').addEventListener('click',function(){inp.value='';con.style.display='none'});</script>
<script src="sidebar.js"></script>
</body></html>
