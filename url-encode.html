<body>

<div class="container-fluid">
  <div class="row">
    <div id="sidebar-desktop" class="d-none d-md-block col-md-3 col-lg-2 ps-0"></div>


    <main class="col-md-9 col-lg-10 p-4">
      <nav class="navbar navbar-dark navbar-tool d-md-none sticky-top mb-4">
        <div class="container-fluid">
          <button class="btn btn-outline-light btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar" aria-label="Buka menu navigasi">?</button>
          <span class="navbar-brand ms-2">URL Encode/Decode</span>
        </div>
      </nav>

      <header class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-3">
          <div class="tool-icon" style="background:var(--accent-soft);color:var(--accent);"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg></div>
          <div>
            <h1 class="h3 mb-0">URL Encode / Decode</h1>
            <p class="text-muted small mb-0">Encode atau decode URL-encoded string dengan cepat. Mendukung encodeURIComponent dan encodeURI.</p>
          </div>
        </div>
      </header>

      <div class="card p-4 shadow-sm">
        <div class="mb-3">
          <label for="inputText" class="form-label">Input</label>
          <textarea id="inputText" class="form-control" placeholder="Masukkan teks atau URL encoded string..."></textarea>
        </div>
        <div class="d-flex gap-2 flex-wrap mb-3">
          <button id="btnEncComponent" class="btn btn-success">encodeURIComponent</button>
          <button id="btnEncURI" class="btn btn-outline-success">encodeURI</button>
          <button id="btnDecode" class="btn btn-warning">decodeURIComponent</button>
          <button id="btnSwap" class="btn btn-outline-secondary">Swap Input/Output</button>
          <button id="btnClear" class="btn btn-outline-danger">Clear</button>
        </div>
        <div>
          <label for="outputText" class="form-label">Output</label>
          <textarea id="outputText" class="form-control" readonly></textarea>
        </div>
      </div>
    </main>
  </div>
</div>

    <!-- Sidebar Mobile (Offcanvas) -->
    <div id="sidebar-mobile"></div>

      © <span id="year">2025</span> WebApps · Dibuat dengan <span class="text-danger">??</span> oleh

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>document.getElementById('year').textContent = new Date().getFullYear();</script>

<script>
var inp = document.getElementById('inputText');
var out = document.getElementById('outputText');

document.getElementById('btnEncComponent').addEventListener('click', function() {
  try { out.value = encodeURIComponent(inp.value); } catch (e) { out.value = 'Error: ' + e.message; }
});
document.getElementById('btnEncURI').addEventListener('click', function() {
  try { out.value = encodeURI(inp.value); } catch (e) { out.value = 'Error: ' + e.message; }
});
document.getElementById('btnDecode').addEventListener('click', function() {
  try { out.value = decodeURIComponent(inp.value); } catch (e) { out.value = 'Error: ' + e.message; }
});
document.getElementById('btnSwap').addEventListener('click', function() {
  var tmp = inp.value;
  inp.value = out.value;
  out.value = tmp;
});
document.getElementById('btnClear').addEventListener('click', function() { inp.value = ''; out.value = ''; });
</script>
<script src="sidebar.js"></script>
</body>
